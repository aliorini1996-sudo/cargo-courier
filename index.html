<style>
  :root {
    --navy: #0f1e33; --orange: #ff8a1e; --gold: #ffd23f;
    --ink: #1a2233; --muted: #5a6a82; --line: #e3e8f0; --card: #ffffff; --page: #f4f6fb;
  }
  @media (prefers-color-scheme: dark) {
    :root { --ink: #eaf0fb; --muted: #94a6c4; --line: #23324c; --card: #13233c; --page: #0b1626; }
  }
  * { box-sizing: border-box; }
  body {
    background: var(--page); color: var(--ink); margin: 0; padding: 0 0 60px;
    font-family: 'Segoe UI', 'Tajawal', system-ui, -apple-system, sans-serif; line-height: 1.75;
  }
  .hero {
    background: linear-gradient(135deg, #0f1e33 0%, #1c3560 60%, #24406f 100%);
    color: #fff; padding: 38px 22px 40px; text-align: center; position: relative; overflow: hidden;
  }
  .hero::after {
    content: ""; position: absolute; top: -60px; inset-inline-end: -40px; width: 260px; height: 260px;
    background: radial-gradient(circle, rgba(255,210,63,0.28), transparent 70%); pointer-events: none;
  }
  .badge svg { width: 56px; height: 56px; filter: drop-shadow(0 3px 8px rgba(0,0,0,0.35)); }
  .title {
    font-size: 30px; font-weight: 900; margin: 8px 0 0; letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--orange), var(--gold));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .sub { margin: 6px 0 0; font-size: 15px; color: #b9c9e6; font-weight: 600; }
  .updated {
    display: inline-block; margin-top: 14px; font-size: 12.5px; font-weight: 700;
    color: #0f1e33; background: var(--gold); padding: 5px 14px; border-radius: 999px;
  }
  /* مبدّل اللغة */
  .langbar {
    max-width: 820px; margin: 18px auto 4px; padding: 0 14px;
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  }
  .langbar button {
    padding: 8px 14px; border: 1px solid var(--line); border-radius: 999px;
    background: var(--card); color: var(--ink); font-family: inherit; font-size: 14px;
    font-weight: 700; cursor: pointer; transition: transform .08s;
  }
  .langbar button:hover { transform: translateY(-1px); }
  .langbar button.active {
    background: linear-gradient(135deg, var(--orange), #ff6a3d); color: #fff; border-color: transparent;
  }
  .wrap { max-width: 760px; margin: 16px auto 0; padding: 0 18px; }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 18px;
    padding: 22px 24px; margin-bottom: 16px; box-shadow: 0 10px 30px rgba(15,30,51,0.08);
  }
  .card h2 { font-size: 18px; font-weight: 800; margin: 0 0 8px; display: flex; align-items: center; gap: 10px; }
  .card h2 .tag { width: 8px; height: 22px; border-radius: 4px; background: linear-gradient(var(--orange), var(--gold)); flex-shrink: 0; }
  .card p { margin: 0; color: var(--muted); font-size: 15px; }
  .card p + p { margin-top: 10px; }
  .card a { color: var(--orange); font-weight: 700; text-decoration: none; }
  .card a:hover { text-decoration: underline; }
  .card b { color: var(--ink); }
  .foot { text-align: center; color: var(--muted); font-size: 13px; margin-top: 30px; padding: 0 18px; }
  .foot b { color: var(--ink); }
</style>

const ORDER = ['en','ar','es','pt','fr','de','ja','ko','tr','it'];

function render(code) {
  const t = T[code];
  document.documentElement.lang = code;
  document.documentElement.dir = t.dir;
  document.getElementById('subtitle').textContent = t.title;
  document.getElementById('updatedLbl').textContent = t.updated;
  const card = (h, ...ps) => '<section class="card"><h2><span class="tag"></span>'+h+'</h2>'+ps.map(p=>'<p>'+p+'</p>').join('')+'</section>';
  document.getElementById('content').innerHTML =
    card(t.data_h, t.data_p) + card(t.ads_h, t.ads_p1, t.ads_p2) +
    card(t.ch_h, t.ch_p) + card(t.del_h, t.del_p) + card(t.con_h, t.con_p);
  document.querySelectorAll('.langbar button').forEach(b => b.classList.toggle('active', b.dataset.l === code));
  try { localStorage.setItem('cc_priv_lang', code); } catch(e){}
}
const bar = document.getElementById('langbar');
ORDER.forEach(code => {
  const b = document.createElement('button');
  b.textContent = T[code].name; b.dataset.l = code; b.dir = T[code].dir;
  b.onclick = () => render(code);
  bar.appendChild(b);
});
// اللغة الأولية: المحفوظة، أو لغة المتصفح إن كانت مدعومة، وإلا الإنجليزية
let init = 'en';
try { const s = localStorage.getItem('cc_priv_lang'); if (s && T[s]) init = s; else { const n = (navigator.language||'en').slice(0,2); if (T[n]) init = n; } } catch(e){}
render(init);
