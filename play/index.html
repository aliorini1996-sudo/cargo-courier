<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1b1e28" />
    <title>موصل الشحنات — Cargo Courier</title>
    <script type="module" crossorigin src="./assets/index-2l14opCv.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DwbJCZgP.css">
  </head>
  <body>
    <div id="app">
      <canvas id="game"></canvas>

      <!-- شريط علوي: النقاط + شريط تقدّم نحو الرقم القياسي -->
      <div id="hudTop" class="hud-top">
        <div class="best-chip">
          <svg viewBox="0 0 24 24" class="ic"><path fill="currentColor" d="M6 3h12v2h4v3.2c0 2.6-2 4.7-4.6 4.9A6 6 0 0 1 13 16.9V19h3.2v2.5H7.8V19H11v-2.1a6 6 0 0 1-4.4-3.8C4 12.9 2 10.8 2 8.2V5h4V3zm-2 4.5v.7c0 1.2.8 2.2 2 2.6V7.5H4zm16 0h-2v3.3c1.2-.4 2-1.4 2-2.6v-.7z"/></svg>
          <span id="bestTop">0</span>
        </div>
        <div class="score-wrap">
          <div id="score" class="score">0</div>
          <div id="recordWrap" class="record-wrap">
            <div id="recordFill" class="record-fill"></div>
          </div>
        </div>
        <div id="modeChip" class="mode-chip"></div>
        <button id="pauseBtn" class="pause-btn" aria-label="pause">
          <svg viewBox="0 0 24 24" class="ic"><rect x="5.5" y="4" width="4.5" height="16" rx="1.6" fill="currentColor"/><rect x="14" y="4" width="4.5" height="16" rx="1.6" fill="currentColor"/></svg>
        </button>
      </div>

      <div id="hintLayer" class="hint-layer"></div>

      <!-- القائمة الرئيسية -->
      <div id="menu" class="overlay show">
        <div class="panel">
          <button id="langBtn" class="lang-btn" aria-label="language">
            <svg viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="1.8" d="M12 3a9 9 0 1 0 0 18 9 9 0 0 0 0-18zm0 0c2.5 2.3 3.8 5.6 3.8 9s-1.3 6.7-3.8 9c-2.5-2.3-3.8-5.6-3.8-9S9.5 5.3 12 3zM3.5 9h17M3.5 15h17"/></svg>
          </button>
          <h1 class="logo" data-i18n="title">Cargo Courier</h1>
          <p class="tagline" data-i18n="tagline"></p>

          <div class="rules">
            <div class="rule">
              <span class="dot dot-o"></span><span class="dot dot-w"></span><span class="dot dot-b"></span>
              <span data-i18n="rule1"></span>
            </div>
            <div class="rule"><span class="dot dot-k"></span> <span data-i18n="rule2"></span></div>
            <div class="rule rule-ctl">
              <svg viewBox="0 0 24 24" class="ic"><path fill="currentColor" d="M7.4 8.6 4 12l3.4 3.4 1.4-1.4-1-1h8.4l-1 1 1.4 1.4L20 12l-3.4-3.4-1.4 1.4 1 1H7.8l1-1z"/></svg>
              <span data-i18n="ctlSwipe"></span>&nbsp;·&nbsp;
              <svg viewBox="0 0 24 24" class="ic"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M8 7a4.2 4.2 0 0 1 8.4 0"/><path fill="currentColor" d="M11 7a1.3 1.3 0 0 1 2.6 0v6l2.9.8c1 .3 1.6 1.2 1.4 2.2l-.5 2.6c-.2.9-1 1.6-1.9 1.6h-4.2c-.6 0-1.1-.2-1.5-.7l-3.2-3.9c-.5-.6-.4-1.5.2-2 .5-.4 1.3-.4 1.8.1l1.4 1.4z"/></svg>
              <span data-i18n="ctlTap"></span>
            </div>
          </div>

          <div class="menu-stats">
            <div class="mstat">
              <span class="mstat-label" data-i18n="statBest"></span>
              <span id="menuBest" class="mstat-value">0</span>
            </div>
            <div class="mstat">
              <span class="mstat-label" data-i18n="statCoins"></span>
              <span id="menuCoins" class="mstat-value mstat-coins">0</span>
            </div>
          </div>

          <!-- مهمة اليوم -->
          <div class="mission">
            <div class="mission-head">
              <span class="mission-title" data-i18n="missionTitle"></span>
              <span id="missionProg" class="mission-prog">0/0</span>
            </div>
            <div id="missionTxt" class="mission-txt"></div>
            <div class="mission-bar"><div id="missionFill" class="mission-fill"></div></div>
            <button id="missionClaim" class="btn-mission" style="display:none"></button>
          </div>

          <!-- ورشة الطلاء -->
          <div class="store-head" data-i18n="storeTitle"></div>
          <div id="paintRow" class="paint-row"></div>

          <button id="shieldBtn" class="btn btn-shield">
            <svg viewBox="0 0 24 24" class="ic"><path fill="currentColor" d="M12 2 4.5 5v6.1c0 4.8 3.2 9.3 7.5 10.9 4.3-1.6 7.5-6.1 7.5-10.9V5L12 2zm3.4 7.6-4.1 4.7a1 1 0 0 1-1.5 0l-1.9-2.1 1.2-1.1 1.5 1.6 3.6-4.2 1.2 1.1z"/></svg>
            <span class="shield-txt"><span id="shieldMain"></span><small id="shieldSub"></small></span>
          </button>

          <button id="playBtn" class="btn btn-giant">
            <svg viewBox="0 0 24 24" class="ic"><path fill="currentColor" d="M2.5 6.8c0-.9.7-1.6 1.6-1.6h8.8c.9 0 1.6.7 1.6 1.6v8H2.5v-8zM16 9h2.4c.5 0 .9.2 1.2.6l1.9 2.5c.2.3.3.6.3 1v1.7H16V9zM6 19.4a2.1 2.1 0 1 1 0-4.2 2.1 2.1 0 0 1 0 4.2zm11.5 0a2.1 2.1 0 1 1 0-4.2 2.1 2.1 0 0 1 0 4.2z"/></svg>
            <span data-i18n="play"></span>
          </button>
        </div>
      </div>

      <!-- شاشة الخسارة -->
      <div id="deadScreen" class="overlay">
        <div class="panel">
          <div id="newBest" class="new-best">
            <svg viewBox="0 0 24 24" class="ic"><path fill="currentColor" d="m12 2.4 2.9 5.9 6.5 1-4.7 4.6 1.1 6.5L12 17.3l-5.8 3.1 1.1-6.5L2.6 9.3l6.5-1z"/></svg>
            <span data-i18n="newBest"></span>
          </div>
          <div id="deadReason" class="dead-reason"></div>
          <div class="dead-score-big" id="deadScore">0</div>
          <div class="dead-sub"><span data-i18n="pts"></span> &nbsp;·&nbsp; <span data-i18n="bestLbl"></span> <b id="deadBest">0</b></div>

          <button id="reviveBtn" class="btn btn-revive">
            <svg viewBox="0 0 24 24" class="ic revive-ic"><path fill="currentColor" d="M8 5.4v13.2c0 .8.9 1.3 1.6.9l10.6-6.6c.7-.4.7-1.4 0-1.8L9.6 4.5c-.7-.4-1.6.1-1.6.9z"/></svg>
            <span class="revive-txt"><span data-i18n="reviveMain"></span><small data-i18n="reviveSub"></small></span>
          </button>

          <button id="doubleBtn" class="btn btn-double">
            <svg viewBox="0 0 24 24" class="ic"><path fill="currentColor" d="M12 2a7 7 0 0 1 7 7c0 2.4-1.2 4.5-3 5.7V17a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2v-2.3A7 7 0 0 1 12 2zm-2 19h4v1.5a1.5 1.5 0 0 1-1.5 1.5h-1A1.5 1.5 0 0 1 10 22.5V21z"/></svg>
            <span class="revive-txt"><span data-i18n="doubleMain"></span><small data-i18n="doubleSub"></small></span>
          </button>

          <button id="retryBtn" class="btn btn-giant">
            <svg viewBox="0 0 24 24" class="ic"><path fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" d="M19.3 12a7.3 7.3 0 1 1-2.5-5.5"/><path fill="currentColor" d="M20.6 2.8v5.4h-5.4z"/></svg>
            <span data-i18n="retry"></span>
          </button>
          <button id="menuBtn" class="btn-link" data-i18n="menuLbl"></button>
        </div>
      </div>

      <!-- الإيقاف المؤقت -->
      <div id="pauseScreen" class="overlay">
        <div class="panel">
          <h2 class="pause-title" data-i18n="pauseTitle"></h2>
          <p class="pause-sub" data-i18n="pauseSub"></p>
          <button id="resumeBtn" class="btn btn-giant">
            <svg viewBox="0 0 24 24" class="ic"><path fill="currentColor" d="M8 5.4v13.2c0 .8.9 1.3 1.6.9l10.6-6.6c.7-.4.7-1.4 0-1.8L9.6 4.5c-.7-.4-1.6.1-1.6.9z"/></svg>
            <span data-i18n="resume"></span>
          </button>
          <button id="pauseMenuBtn" class="btn-link" data-i18n="quit"></button>
        </div>
      </div>

      <div id="countdown" class="countdown"></div>

      <!-- مبدّل اللغة: عشر لغات -->
      <div id="langScreen" class="overlay">
        <div class="panel lang-panel">
          <h2 id="langTitle" class="lang-panel-title">Language</h2>
          <div id="langGrid" class="lang-grid"></div>
          <button id="langClose" class="btn-link">✕</button>
        </div>
      </div>

      <div id="banner" class="banner" data-i18n="banner"></div>
    </div>

  </body>
</html>
